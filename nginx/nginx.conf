# ==========================================
# Nginx Configuration - Zomato Clone
# ==========================================
# Optimized for performance, security, and caching
# Production-ready with best practices

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # ==========================================
    # GZIP COMPRESSION
    # Reduces response size by 70-80%
    # Speeds up page load significantly
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # ==========================================
    # STATIC ASSET CACHING
    # Cache static assets for 7 days in browser
    # Reduces bandwidth and server load
    # ==========================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header ETag '"static-assets"';
    }

    # ==========================================
    # DEFAULT ROUTE (SPA Support)
    # Routes all requests to index.html for SPA
    # Preserves URL history for client-side routing
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ==========================================
    # SECURITY HEADERS
    # Protect against common web vulnerabilities
    # ==========================================
    
    # Prevent clickjacking (X-Frame-Options)
    # SAMEORIGIN: Allow framing only from same origin
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing (X-Content-Type-Options)
    # nosniff: Don't sniff MIME types, use declared type
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS protection (X-XSS-Protection)
    # 1; mode=block: Enable XSS filter and block page if attack detected
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Control referrer information (Referrer-Policy)
    # strict-origin-when-cross-origin: Send referrer only for some cases
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (CSP)
    # Controls which resources can be loaded
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src 'self' fonts.gstatic.com cdnjs.cloudflare.com; img-src 'self' data: https:;" always;

    # ==========================================
    # PERFORMANCE OPTIMIZATION
    # ==========================================
    
    # Keep-alive connections (reduce connection overhead)
    keepalive_timeout 65;
    
    # Buffer sizes (optimize for dynamic content)
    client_body_buffer_size 128k;
    client_max_body_size 100m;
    
    # Timeouts
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ==========================================
    # LOGGING (Optional - uncomment if needed)
    # ==========================================
    # access_log /var/log/nginx/access.log main;
    # error_log /var/log/nginx/error.log warn;

}

