version: '3.8'

services:
  zomato-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zomato-clone-app
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    volumes:
      - ./src:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - zomato-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  zomato-network:
    driver: bridge
